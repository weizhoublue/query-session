name: Manual Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (commit SHA, tag, or branch name)"
        required: true
        type: string
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Unit tests
        run: go test ./... -count=1

      - name: Build linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o query-session-linux-amd64 ./cmd/query-session

      - name: Build darwin amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -o query-session-darwin-amd64 ./cmd/query-session

      - name: Build darwin arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o query-session-darwin-arm64 ./cmd/query-session

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: query-session-${{ inputs.version }}
          path: |
            query-session-linux-amd64
            query-session-darwin-amd64
            query-session-darwin-arm64
