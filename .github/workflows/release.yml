name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Unit tests
        run: go test ./... -count=1

      - name: Build linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o query-session-linux-amd64 ./cmd/query-session

      - name: Build linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -o query-session-linux-arm64 ./cmd/query-session

      - name: Build darwin arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o query-session-macos-arm64 ./cmd/query-session

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            query-session-linux-amd64
            query-session-linux-arm64
            query-session-macos-arm64
          generate_release_notes: true

      - name: Create release branch
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          BRANCH="release/${TAG_NAME}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
